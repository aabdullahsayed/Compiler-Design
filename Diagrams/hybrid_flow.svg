<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <style>
      .box { rx: 8px; ry: 8px; stroke: #2c3e50; stroke-width: 2; }
      .container-box { rx: 12px; ry: 12px; stroke: #2c3e50; stroke-width: 2; stroke-dasharray: 8,4; fill: #fdfae6; }
      .text-main { font-family: 'Segoe UI', Helvetica, sans-serif; font-size: 18px; font-weight: bold; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .text-sub { font-family: 'Segoe UI', Helvetica, sans-serif; font-size: 14px; fill: #ecf0f1; text-anchor: middle; dominant-baseline: middle; }
      .text-side { font-family: 'Segoe UI', Helvetica, sans-serif; font-size: 14px; fill: #555555; font-style: italic; }
      .text-container-title { font-family: 'Segoe UI', Helvetica, sans-serif; font-size: 16px; font-weight: bold; fill: #333333; text-anchor: middle; }
      .line { stroke: #333333; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#f8f9fa" rx="15"/>

  <line x1="150" y1="50" x2="150" y2="340" stroke="#2980b9" stroke-width="4" />
  <line x1="150" y1="50" x2="170" y2="50" stroke="#2980b9" stroke-width="4" />
  <line x1="150" y1="340" x2="170" y2="340" stroke="#2980b9" stroke-width="4" />
  <text class="text-container-title" x="125" y="195" transform="rotate(-90 125,195)" fill="#2980b9">PHASE 1: COMPILE TIME</text>

  <rect class="box" x="250" y="50" width="350" height="70" fill="#27ae60" />
  <text class="text-main" x="425" y="75">Source Code</text>
  <text class="text-sub" x="425" y="100">(.java or .cs files)</text>

  <line class="line" x1="425" y1="120" x2="425" y2="160" />

  <rect class="box" x="250" y="160" width="350" height="70" fill="#2980b9" />
  <text class="text-main" x="425" y="185">Language Compiler</text>
  <text class="text-sub" x="425" y="210">(javac or Roslyn)</text>

  <line class="line" x1="425" y1="230" x2="425" y2="270" />
  <text class="text-side" x="445" y="255">Translates to universal format</text>

  <rect class="box" x="250" y="270" width="350" height="70" fill="#8e44ad" />
  <text class="text-main" x="425" y="295">Intermediate Language (IL)</text>
  <text class="text-sub" x="425" y="320">(Bytecode or CIL / .class or .dll)</text>

  <line x1="150" y1="390" x2="150" y2="780" stroke="#d35400" stroke-width="4" />
  <line x1="150" y1="390" x2="170" y2="390" stroke="#d35400" stroke-width="4" />
  <line x1="150" y1="780" x2="170" y2="780" stroke="#d35400" stroke-width="4" />
  <text class="text-container-title" x="125" y="585" transform="rotate(-90 125,585)" fill="#d35400">PHASE 2: RUN TIME (ON USER'S PC)</text>

  <line class="line" x1="425" y1="340" x2="425" y2="410" />
  <text class="text-side" x="445" y="380">Program is executed by the user</text>

  <rect class="container-box" x="220" y="410" width="410" height="230" />
  <text class="text-container-title" x="425" y="440">Virtual Machine (JVM or CLR)</text>

  <rect class="box" x="275" y="460" width="300" height="70" fill="#f39c12" />
  <text class="text-main" x="425" y="485">Just-In-Time (JIT) Compiler</text>
  <text class="text-sub" x="425" y="510">Compiles IL blocks on the fly</text>

  <line class="line" x1="425" y1="530" x2="425" y2="560" />

  <rect class="box" x="275" y="560" width="300" height="50" fill="#d35400" />
  <text class="text-main" x="425" y="585">Compiled Machine Code Cache</text>

  <line class="line" x1="425" y1="640" x2="425" y2="710" />
  <text class="text-side" x="445" y="680">Direct Execution</text>

  <rect class="box" x="250" y="710" width="350" height="70" fill="#c0392b" />
  <text class="text-main" x="425" y="735">Hardware Processor</text>
  <text class="text-sub" x="425" y="760">(x86, ARM, etc.)</text>

</svg>
