<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.08" flood-color="#0f172a"/>
    </filter>

    <style>
      /* Main Canvas & Containers */
      .bg-canvas { fill: #ffffff; }
      .phase-bg { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2px; rx: 12px; }
      
      /* Process Boxes */
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2px; rx: 8px; filter: url(#shadow); }
      .container-box { fill: #f1f5f9; stroke: #64748b; stroke-width: 2px; stroke-dasharray: 6,4; rx: 10px; }
      
      /* Typography - High Contrast */
      .phase-title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; font-weight: 800; fill: #1e293b; letter-spacing: 1.5px; text-anchor: middle; }
      .text-main { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; font-weight: 800; fill: #0f172a; text-anchor: middle; }
      .text-sub { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #475569; text-anchor: middle; }
      .text-small { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: 500; fill: #475569; text-anchor: middle; }
      
      .text-side { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #334155; font-style: italic; text-anchor: middle; }
      .text-container-title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; font-weight: 800; fill: #0f172a; text-anchor: middle; }
      
      /* Flow Lines */
      .line { stroke: #475569; stroke-width: 3px; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg-canvas" />

  <rect class="phase-bg" x="20" y="20" width="860" height="230" />
  <text class="phase-title" x="450" y="55">PHASE 1: COMPILE TIME</text>

  <rect class="box" x="50" y="90" width="180" height="110" />
  <text class="text-main" x="140" y="135">Source Code</text>
  <text class="text-sub" x="140" y="165">(.java or .cs files)</text>

  <line class="line" x1="230" y1="145" x2="320" y2="145" />

  <rect class="box" x="330" y="90" width="180" height="110" />
  <text class="text-main" x="420" y="135">Language Compiler</text>
  <text class="text-sub" x="420" y="165">(javac or Roslyn)</text>

  <line class="line" x1="510" y1="145" x2="610" y2="145" />
  <text class="text-side" x="560" y="120">Translates to</text>
  <text class="text-side" x="560" y="138">universal format</text>

  <rect class="box" x="620" y="90" width="220" height="110" />
  <text class="text-main" x="730" y="130">Intermediate</text>
  <text class="text-main" x="730" y="150">Language (IL)</text>
  <text class="text-sub" x="730" y="175">(.class, .dll, Bytecode)</text>


  <path class="line" d="M 730 200 v 80 h -570 v 85" />
  
  <rect x="330" y="265" width="240" height="30" fill="#ffffff" rx="15" />
  <text class="text-side" x="450" y="285" fill="#0f172a">Program is executed by the user</text>


  <rect class="phase-bg" x="20" y="320" width="860" height="280" />
  <text class="phase-title" x="450" y="355">PHASE 2: RUN TIME (ON USER'S PC)</text>

  <rect class="container-box" x="40" y="380" width="530" height="190" />
  <text class="text-container-title" x="305" y="415">Virtual Machine (JVM or CLR)</text>

  <rect class="box" x="60" y="435" width="200" height="110" />
  <text class="text-main" x="160" y="465">Just-In-Time (JIT)</text>
  <text class="text-main" x="160" y="485">Compiler</text>
  <text class="text-small" x="160" y="510">Compiles IL blocks</text>
  <text class="text-small" x="160" y="530">on the fly</text>

  <line class="line" x1="260" y1="490" x2="330" y2="490" />

  <rect class="box" x="340" y="435" width="200" height="110" />
  <text class="text-main" x="440" y="480">Compiled Machine</text>
  <text class="text-main" x="440" y="500">Code Cache</text>

  <line class="line" x1="570" y1="490" x2="650" y2="490" />
  <text class="text-side" x="610" y="470">Direct</text>
  <text class="text-side" x="610" y="488">Execution</text>

  <rect class="box" x="660" y="435" width="190" height="110" />
  <text class="text-main" x="755" y="480">Hardware</text>
  <text class="text-main" x="755" y="500">Processor</text>
  <text class="text-sub" x="755" y="525">(x86, ARM, etc.)</text>

</svg>
