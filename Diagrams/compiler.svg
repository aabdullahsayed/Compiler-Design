<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 1000" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.1" />
    </filter>

    <style>
      .bg { fill: #f8fafc; }
      .box { rx: 8px; ry: 8px; filter: url(#shadow); stroke-width: 1.5; }
      
      /* Phase Colors */
      .box-analysis { fill: #2563eb; stroke: #1e40af; }     /* Blue */
      .box-intermediate { fill: #7c3aed; stroke: #5b21b6; } /* Purple */
      .box-optimizer { fill: #059669; stroke: #065f46; }    /* Green */
      .box-generator { fill: #ea580c; stroke: #9a3412; }    /* Orange */
      
      /* Symbol Table Style */
      .box-symbol { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12px; ry: 12px; filter: url(#shadow); }
      .text-symbol-title { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 20px; font-weight: bold; fill: #1e293b; text-anchor: middle; }
      .text-symbol-desc { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 14px; fill: #475569; text-anchor: middle; }
      
      /* Flow Text Styles */
      .text-main { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 18px; font-weight: 600; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .text-stream { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; font-style: italic; fill: #475569; text-anchor: middle; dominant-baseline: middle; }
      
      /* Title and Explanation Styles */
      .text-title { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 28px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
      .text-desc-title { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #1e293b; }
      .text-desc { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 15px; fill: #475569; }
      
      /* Lines */
      .line-flow { stroke: #475569; stroke-width: 2; }
      .line-arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrow); }
      .line-dashed { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 6,6; }
      .line-callout { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 4,4; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text class="text-title" x="575" y="45">The Phases of a Compiler</text>

  <rect class="box-symbol" x="40" y="270" width="180" height="420" />
  <text class="text-symbol-title" x="130" y="320">Symbol Table</text>
  
  <line x1="60" y1="340" x2="200" y2="340" stroke="#e2e8f0" stroke-width="2" />
  
  <text class="text-symbol-desc" x="130" y="380">A shared database</text>
  <text class="text-symbol-desc" x="130" y="405">accessed by all phases</text>
  <text class="text-symbol-desc" x="130" y="430">to track and manage:</text>
  
  <text class="text-symbol-desc" x="130" y="470" font-weight="bold">• Variable Names</text>
  <text class="text-symbol-desc" x="130" y="495" font-weight="bold">• Data Types</text>
  <text class="text-symbol-desc" x="130" y="520" font-weight="bold">• Scope &amp; Memory</text>
  <text class="text-symbol-desc" x="130" y="545" font-weight="bold">• Function Signatures</text>

  <line class="line-dashed" x1="220" y1="320" x2="270" y2="320" />
  <line class="line-dashed" x1="220" y1="480" x2="270" y2="480" />
  <line class="line-dashed" x1="220" y1="640" x2="270" y2="640" />

  <text class="text-stream" x="420" y="80">character stream (raw source code)</text>
  <line class="line-arrow" x1="420" y1="90" x2="420" y2="105" />

  <rect class="box box-analysis" x="270" y="110" width="300" height="60" />
  <text class="text-main" x="420" y="140">Lexical Analyzer</text>
  
  <line class="line-callout" x1="570" y1="140" x2="620" y2="140" />
  <circle cx="620" cy="140" r="5" fill="#2563eb" />
  <text class="text-desc-title" x="640" y="130">1. Tokenization</text>
  <text class="text-desc" x="640" y="152">Scans raw characters and groups them into meaningful</text>
  <text class="text-desc" x="640" y="172">'tokens' (keywords, variables) while removing whitespace.</text>

  <line class="line-flow" x1="420" y1="170" x2="420" y2="180" />
  <text class="text-stream" x="420" y="195">token stream</text>
  <line class="line-arrow" x1="420" y1="210" x2="420" y2="220" />

  <rect class="box box-analysis" x="270" y="230" width="300" height="60" />
  <text class="text-main" x="420" y="260">Syntax Analyzer</text>

  <line class="line-callout" x1="570" y1="260" x2="620" y2="260" />
  <circle cx="620" cy="260" r="5" fill="#2563eb" />
  <text class="text-desc-title" x="640" y="250">2. Tree Construction (Parsing)</text>
  <text class="text-desc" x="640" y="272">Validates token sequences against grammar rules, building</text>
  <text class="text-desc" x="640" y="292">a hierarchical 'Syntax Tree' representing the program's structure.</text>

  <line class="line-flow" x1="420" y1="290" x2="420" y2="300" />
  <text class="text-stream" x="420" y="315">syntax tree</text>
  <line class="line-arrow" x1="420" y1="330" x2="420" y2="340" />

  <rect class="box box-analysis" x="270" y="350" width="300" height="60" />
  <text class="text-main" x="420" y="380">Semantic Analyzer</text>

  <line class="line-callout" x1="570" y1="380" x2="620" y2="380" />
  <circle cx="620" cy="380" r="5" fill="#2563eb" />
  <text class="text-desc-title" x="640" y="370">3. Logic &amp; Type Checking</text>
  <text class="text-desc" x="640" y="392">Checks the tree for contextual validity, ensuring operations</text>
  <text class="text-desc" x="640" y="412">make sense (e.g., preventing a string from multiplying an int).</text>

  <line class="line-flow" x1="420" y1="410" x2="420" y2="420" />
  <text class="text-stream" x="420" y="435">syntax tree</text>
  <line class="line-arrow" x1="420" y1="450" x2="420" y2="460" />

  <rect class="box box-intermediate" x="270" y="470" width="300" height="60" />
  <text class="text-main" x="420" y="500">Intermediate Code Generator</text>

  <line class="line-callout" x1="570" y1="500" x2="620" y2="500" />
  <circle cx="620" cy="500" r="5" fill="#7c3aed" />
  <text class="text-desc-title" x="640" y="490">4. Universal Translation</text>
  <text class="text-desc" x="640" y="512">Translates the syntax tree into a simple, machine-independent</text>
  <text class="text-desc" x="640" y="532">format (like 3-address code) bridging high and low-level code.</text>

  <line class="line-flow" x1="420" y1="530" x2="420" y2="540" />
  <text class="text-stream" x="420" y="555">intermediate representation</text>
  <line class="line-arrow" x1="420" y1="570" x2="420" y2="580" />

  <rect class="box box-optimizer" x="270" y="590" width="300" height="70" />
  <text class="text-main" x="420" y="613">Machine-Independent</text>
  <text class="text-main" x="420" y="638">Code Optimizer</text>

  <line class="line-callout" x1="570" y1="625" x2="620" y2="625" />
  <circle cx="620" cy="625" r="5" fill="#059669" />
  <text class="text-desc-title" x="640" y="610">5. Code Enhancement</text>
  <text class="text-desc" x="640" y="632">Improves the intermediate code to run faster or use less</text>
  <text class="text-desc" x="640" y="652">memory (e.g., removing dead code, pre-calculating math).</text>

  <line class="line-flow" x1="420" y1="660" x2="420" y2="670" />
  <text class="text-stream" x="420" y="685">intermediate representation</text>
  <line class="line-arrow" x1="420" y1="700" x2="420" y2="710" />

  <rect class="box box-generator" x="270" y="720" width="300" height="60" />
  <text class="text-main" x="420" y="750">Code Generator</text>

  <line class="line-callout" x1="570" y1="750" x2="620" y2="750" />
  <circle cx="620" cy="750" r="5" fill="#ea580c" />
  <text class="text-desc-title" x="640" y="740">6. Hardware Translation</text>
  <text class="text-desc" x="640" y="762">Converts the optimized intermediate code into the actual</text>
  <text class="text-desc" x="640" y="782">assembly or machine instructions for the target CPU.</text>

  <line class="line-flow" x1="420" y1="780" x2="420" y2="790" />
  <text class="text-stream" x="420" y="805">target-machine code</text>
  <line class="line-arrow" x1="420" y1="820" x2="420" y2="830" />

  <rect class="box box-optimizer" x="270" y="840" width="300" height="70" />
  <text class="text-main" x="420" y="863">Machine-Dependent</text>
  <text class="text-main" x="420" y="888">Code Optimizer</text>

  <line class="line-callout" x1="570" y1="875" x2="620" y2="875" />
  <circle cx="620" cy="875" r="5" fill="#059669" />
  <text class="text-desc-title" x="640" y="860">7. Final Architecture Tweaks</text>
  <text class="text-desc" x="640" y="882">Applies final tweaks tailored to the specific CPU architecture</text>
  <text class="text-desc" x="640" y="902">(like optimizing register usage or CPU pipeline scheduling).</text>

  <line class="line-flow" x1="420" y1="910" x2="420" y2="920" />
  <text class="text-stream" x="420" y="935">final target-machine code</text>
  <line class="line-arrow" x1="420" y1="950" x2="420" y2="970" />

</svg>
