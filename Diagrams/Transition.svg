<svg viewBox="0 0 750 600" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: #ffffff;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>

  <text x="15" y="275" font-size="14" fill="#333">start</text>
  <path d="M 50 280 L 70 280" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M 105 265 Q 160 100 230 100" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="150" y="160" font-size="16" font-weight="bold" fill="#d32f2f">+</text>

  <path d="M 115 270 Q 170 220 230 220" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="165" y="240" font-size="18" font-weight="bold" fill="#d32f2f">-</text>

  <path d="M 115 290 Q 170 340 230 340" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="165" y="330" font-size="18" font-weight="bold" fill="#d32f2f">*</text>

  <path d="M 105 295 Q 160 460 230 460" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="150" y="410" font-size="16" font-weight="bold" fill="#d32f2f">/</text>

  <path d="M 270 100 L 380 70" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="320" y="75" font-size="16" font-weight="bold" fill="#d32f2f">+</text>
  <path d="M 270 100 L 380 130" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="310" y="135" font-size="14">other</text>

  <path d="M 270 220 L 380 190" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="320" y="195" font-size="18" font-weight="bold" fill="#d32f2f">-</text>
  <path d="M 270 220 L 380 250" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="310" y="255" font-size="14">other</text>

  <path d="M 270 340 L 380 310" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="320" y="315" font-size="18" font-weight="bold" fill="#d32f2f">*</text>
  <path d="M 270 340 L 380 370" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="310" y="375" font-size="14">other</text>

  <path d="M 270 460 L 380 430" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="320" y="435" font-size="16" font-weight="bold" fill="#d32f2f">/</text>
  <path d="M 270 460 L 380 490" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="310" y="495" font-size="14">other</text>

  <circle cx="90" cy="280" r="20" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="285" text-anchor="middle" font-size="14">0</text>

  <circle cx="250" cy="100" r="20" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="105" text-anchor="middle" font-size="14">1</text>

  <circle cx="250" cy="220" r="20" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="225" text-anchor="middle" font-size="14">2</text>

  <circle cx="250" cy="340" r="20" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="345" text-anchor="middle" font-size="14">3</text>

  <circle cx="250" cy="460" r="20" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="465" text-anchor="middle" font-size="14">4</text>

  <circle cx="400" cy="70" r="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="400" cy="70" r="16" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="430" y="75" font-size="14" font-family="monospace">return (INCREMENT, "++")</text>

  <circle cx="400" cy="130" r="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="400" cy="130" r="16" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="425" y="115" font-size="18" fill="#333" font-weight="bold">*</text>
  <text x="430" y="135" font-size="14" font-family="monospace">return (PLUS, "+")</text>

  <circle cx="400" cy="190" r="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="400" cy="190" r="16" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="430" y="195" font-size="14" font-family="monospace">return (DECREMENT, "--")</text>

  <circle cx="400" cy="250" r="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="400" cy="250" r="16" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="425" y="235" font-size="18" fill="#333" font-weight="bold">*</text>
  <text x="430" y="255" font-size="14" font-family="monospace">return (MINUS, "-")</text>

  <circle cx="400" cy="310" r="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="400" cy="310" r="16" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="430" y="315" font-size="14" font-family="monospace">return (POWER, "**")</text>

  <circle cx="400" cy="370" r="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="400" cy="370" r="16" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="425" y="355" font-size="18" fill="#333" font-weight="bold">*</text>
  <text x="430" y="375" font-size="14" font-family="monospace">return (MULT, "*")</text>

  <circle cx="400" cy="430" r="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="400" cy="430" r="16" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="430" y="435" font-size="14" font-family="monospace">return (FLOOR_DIV, "//")</text>

  <circle cx="400" cy="490" r="20" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="400" cy="490" r="16" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="425" y="475" font-size="18" fill="#333" font-weight="bold">*</text>
  <text x="430" y="495" font-size="14" font-family="monospace">return (DIV, "/")</text>

</svg>
