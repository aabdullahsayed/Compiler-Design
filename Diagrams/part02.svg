<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8px; }
      .title { font-family: 'Segoe UI', sans-serif; font-size: 28px; font-weight: bold; fill: #0f172a; }
      .phase { font-family: 'Segoe UI', sans-serif; font-size: 22px; font-weight: bold; fill: #7c3aed; }
      .comment { font-family: 'Segoe UI', sans-serif; font-size: 18px; fill: #64748b; font-style: italic; }
      .code { font-family: 'Consolas', monospace; font-size: 24px; font-weight: bold; fill: #1e293b; text-anchor: middle; }
      .code-left { font-family: 'Consolas', monospace; font-size: 22px; font-weight: bold; fill: #1e293b; }
      .tree-line { stroke: #94a3b8; stroke-width: 3; }
      .node-box { fill: #e2e8f0; rx: 6px; }
      .highlight { fill: #fef9c3; stroke: #fde047; stroke-width: 2; rx: 6px; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="450" y="50" class="title" text-anchor="middle">Part 2: Middle-End (Logic &amp; Flattening)</text>

  <text x="50" y="120" class="phase">3. Semantic Analysis (Logic &amp; Types)</text>
  <text x="50" y="150" class="comment">Notices id1, id2, id3 are floats, but 60 is an integer. Injects 'inttofloat'.</text>

  <rect x="50" y="170" width="800" height="300" class="box" />
  
  <line x1="450" y1="200" x2="350" y2="240" class="tree-line" />
  <line x1="450" y1="200" x2="550" y2="240" class="tree-line" />
  <line x1="550" y1="270" x2="450" y2="310" class="tree-line" />
  <line x1="550" y1="270" x2="650" y2="310" class="tree-line" />
  <line x1="650" y1="340" x2="550" y2="380" class="tree-line" />
  <line x1="650" y1="340" x2="750" y2="380" class="tree-line" />
  <line x1="750" y1="410" x2="750" y2="440" class="tree-line" />

  <rect x="430" y="180" width="40" height="40" class="node-box" />
  <text x="450" y="208" class="code">=</text>

  <text x="350" y="265" class="code" fill="#ea580c">&lt;id,1&gt;</text>
  <rect x="530" y="250" width="40" height="40" class="node-box" />
  <text x="550" y="278" class="code">+</text>
  <text x="450" y="335" class="code" fill="#ea580c">&lt;id,2&gt;</text>
  <rect x="630" y="320" width="40" height="40" class="node-box" />
  <text x="650" y="348" class="code">*</text>
  <text x="550" y="405" class="code" fill="#ea580c">&lt;id,3&gt;</text>

  <rect x="670" y="380" width="160" height="35" class="highlight" />
  <text x="750" y="405" class="code" fill="#b45309">inttofloat</text>
  <text x="750" y="465" class="code">60</text>

  <text x="50" y="530" class="phase">4. Intermediate Code Generation</text>
  <text x="50" y="560" class="comment">Flattens the tree into "Three-Address Code" (max 3 items per line).</text>

  <rect x="50" y="580" width="800" height="160" class="box" />
  <text x="350" y="615" class="code-left">t1 = <tspan fill="#b45309">inttofloat</tspan>(60)</text>
  <text x="350" y="650" class="code-left">t2 = id3 * t1</text>
  <text x="350" y="685" class="code-left">t3 = id2 + t2</text>
  <text x="350" y="720" class="code-left">id1 = t3</text>

</svg>
