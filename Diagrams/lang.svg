<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1200" width="100%" height="100%">
  <defs>
    <style>
      .bg-canvas { fill: #f8fafc; }
      .title-main { font-family: "Segoe UI", Roboto, Helvetica, sans-serif; font-size: 32px; font-weight: 800; fill: #0f172a; }
      .title-sub { font-family: "Segoe UI", Roboto, Helvetica, sans-serif; font-size: 18px; font-weight: 500; fill: #64748b; }
      
      .flow-line { stroke: #94a3b8; stroke-width: 3; }
      .flow-line-dashed { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6,4; }
      
      .data-pill { fill: #e2e8f0; rx: 20; }
      .data-text { font-family: "Segoe UI", Roboto, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #334155; text-anchor: middle; }
      
      .process-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .badge-bg { fill: #475569; rx: 6; }
      .badge-text { font-family: "Segoe UI", Roboto, Helvetica, sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; text-anchor: middle; }
      
      .box-title { font-family: "Segoe UI", Roboto, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #1e293b; }
      .box-desc { font-family: "Segoe UI", Roboto, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      
      .side-text { font-family: "Segoe UI", Roboto, Helvetica, sans-serif; font-size: 14px; font-weight: 600; fill: #64748b; text-anchor: end; }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.05" flood-color="#0f172a"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" class="bg-canvas" />

  <g text-anchor="middle">
    <text x="500" y="60" class="title-main">Language Processing System</text>
    <text x="500" y="90" class="title-sub">Compiler Toolchain Pipeline &amp; Execution Phase</text>
  </g>

  <g>
    <rect x="350" y="140" width="300" height="40" class="data-pill" filter="url(#shadow)"/>
    <text x="500" y="166" class="data-text">Source Program</text>
  </g>
  <line x1="500" y1="180" x2="500" y2="230" class="flow-line" marker-end="url(#arrow)"/>


  <g>
    <rect x="200" y="235" width="600" height="90" class="process-box" filter="url(#shadow)"/>
    <rect x="220" y="260" width="40" height="40" class="badge-bg"/>
    <text x="240" y="287" class="badge-text">1</text>
    <text x="280" y="268" class="box-title">Preprocessor</text>
    <text x="280" y="292" class="box-desc">Processes directives before compilation. Expands shorthand macros (#define),</text>
    <text x="280" y="312" class="box-desc">and inserts required external header files directly into the code.</text>
  </g>
  <line x1="500" y1="325" x2="500" y2="375" class="flow-line" marker-end="url(#arrow)"/>

  <g>
    <rect x="350" y="380" width="300" height="40" class="data-pill" filter="url(#shadow)"/>
    <text x="500" y="406" class="data-text">Modified Source Program</text>
  </g>
  <line x1="500" y1="420" x2="500" y2="470" class="flow-line" marker-end="url(#arrow)"/>


  <g>
    <rect x="200" y="475" width="600" height="90" class="process-box" filter="url(#shadow)"/>
    <rect x="220" y="500" width="40" height="40" class="badge-bg"/>
    <text x="240" y="527" class="badge-text">2</text>
    
    <text x="280" y="508" class="box-title">Compiler</text>
    <text x="280" y="532" class="box-desc">Performs lexical, syntax, and semantic analysis to verify program logic.</text>
    <text x="280" y="552" class="box-desc">Translates the high-level language into architecture-specific Assembly code.</text>
  </g>
  <line x1="500" y1="565" x2="500" y2="615" class="flow-line" marker-end="url(#arrow)"/>

  <g>
    <rect x="350" y="620" width="300" height="40" class="data-pill" filter="url(#shadow)"/>
    <text x="500" y="646" class="data-text">Target Assembly Program</text>
  </g>
  <line x1="500" y1="660" x2="500" y2="710" class="flow-line" marker-end="url(#arrow)"/>


  <g>
    <rect x="200" y="715" width="600" height="90" class="process-box" filter="url(#shadow)"/>
    <rect x="220" y="740" width="40" height="40" class="badge-bg"/>
    <text x="240" y="767" class="badge-text">3</text>
    
    <text x="280" y="748" class="box-title">Assembler</text>
    <text x="280" y="772" class="box-desc">Translates human-readable assembly instructions (mnemonics) into</text>
    <text x="280" y="792" class="box-desc">raw binary instructions (machine code) that the computer hardware can execute.</text>
  </g>
  <line x1="500" y1="805" x2="500" y2="855" class="flow-line" marker-end="url(#arrow)"/>

  <g>
    <rect x="320" y="860" width="360" height="40" class="data-pill" filter="url(#shadow)"/>
    <text x="500" y="886" class="data-text">Relocatable Machine Code (Object File)</text>
  </g>
  <line x1="500" y1="900" x2="500" y2="950" class="flow-line" marker-end="url(#arrow)"/>


  <g>
    <line x1="940" y1="990" x2="810" y2="990" class="flow-line-dashed" marker-end="url(#arrow)"/>
    <text x="930" y="982" class="side-text">Library Files (.lib, .a)</text>
    
    <line x1="940" y1="1030" x2="810" y2="1030" class="flow-line-dashed" marker-end="url(#arrow)"/>
    <text x="930" y="1022" class="side-text">External Object Files</text>
  </g>

  <g>
    <rect x="200" y="955" width="600" height="110" class="process-box" filter="url(#shadow)"/>
    <rect x="220" y="990" width="40" height="40" class="badge-bg"/>
    <text x="240" y="1017" class="badge-text">4</text>
    
    <text x="280" y="985" class="box-title">Linker &amp; Loader</text>
    <text x="280" y="1012" class="box-desc"><tspan font-weight="700" fill="#1e293b">Linker:</tspan> Resolves external references and merges libraries with the object file.</text>
    <text x="280" y="1038" class="box-desc"><tspan font-weight="700" fill="#1e293b">Loader:</tspan> Allocates memory and places the final executable into RAM to run.</text>
  </g>
  <line x1="500" y1="1065" x2="500" y2="1115" class="flow-line" marker-end="url(#arrow)"/>


  <g>
    <rect x="320" y="1120" width="360" height="45" rx="22.5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
    <text x="500" y="1148" class="data-text" fill="#0f172a">Target Machine Code (Executable)</text>
  </g>

</svg>
